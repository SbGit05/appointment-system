spring.application.name=backend

# Port — Render sets PORT automatically
server.port=${PORT:8080}

# Render PostgreSQL sets DATABASE_URL; locally use MySQL via .env or override here
# Note: Defaulting to 3307 as your local MySQL docker container is mapped to 3307
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/appointment_db?createDatabaseIfNotExist=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

# Hibernate Dialect Hint
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.MySQLDialect}

# Let Hibernate pick the right dialect automatically
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ─── CORS ─────────────────────────────────────────────────────────────────────
# Set ALLOWED_ORIGINS env var to your Vercel URL on Render, e.g.:
#   https://your-app.vercel.app
# For local dev it defaults to localhost:5173
cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173}
